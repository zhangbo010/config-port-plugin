# Mainsail/Fluidd 配置端口插件 - Nginx 配置示例
# 端口 80: 普通访问，插件隐藏配置
# 端口 5337: 管理访问，显示完整配置
#
# 使用方法：
# 1. 将 config-port-plugin.js 复制到 Mainsail/Fluidd 的 web 根目录
# 2. 将本配置合并到你的 nginx 配置中，或替换相应 server 块

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream apiserver {
    ip_hash;
    server 127.0.0.1:7125;
}

# 端口 80 - 普通用户访问（隐藏配置按钮）
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    access_log /var/log/nginx/mainsail-access.log;
    error_log /var/log/nginx/mainsail-error.log;

    # 修改为你的 Mainsail 或 Fluidd 安装路径
    root /home/pi/mainsail;
    index index.html;
    server_name _;

    client_max_body_size 200M;

    # 注入插件脚本到 index.html（端口 80 时加载，脚本会根据 URL 端口自动判断）
    location = /index.html {
        sub_filter '</body>' '<script src="/config-port-plugin.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        try_files $uri =404;
    }

    location / {
        sub_filter '</body>' '<script src="/config-port-plugin.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        try_files $uri $uri/ /index.html;
    }

    location /config-port-plugin.js {
        try_files $uri =404;
    }

    location /printer {
        proxy_pass http://apiserver/printer;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }

    location /api {
        proxy_pass http://apiserver/api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }

    location /access {
        proxy_pass http://apiserver/access;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }

    location /websocket {
        proxy_pass http://apiserver/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /machine {
        proxy_pass http://apiserver/machine;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }

    location /server {
        proxy_pass http://apiserver/server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }
}

# 端口 5337 - 管理访问（显示完整配置）
server {
    listen 5337;
    listen [::]:5337;

    access_log /var/log/nginx/mainsail-5337-access.log;
    error_log /var/log/nginx/mainsail-5337-error.log;

    root /home/pi/mainsail;
    index index.html;
    server_name _;

    client_max_body_size 200M;

    # 同样注入插件，脚本根据 URL 端口自动判断：5337 显示配置
    location / {
        sub_filter '</body>' '<script src="/config-port-plugin.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        try_files $uri $uri/ /index.html;
    }

    location /config-port-plugin.js {
